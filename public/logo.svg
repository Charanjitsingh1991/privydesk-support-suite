<svg width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="#a3e635"/>
  
  <!-- Ticket Icon -->
  <g transform="translate(156, 156)">
    <!-- Ticket Body -->
    <rect x="0" y="40" width="200" height="160" rx="12" fill="#000000"/>
    
    <!-- Ticket Lines -->
    <rect x="30" y="70" width="140" height="12" rx="6" fill="#a3e635"/>
    <rect x="30" y="100" width="100" height="12" rx="6" fill="#a3e635"/>
    <rect x="30" y="130" width="140" height="12" rx="6" fill="#a3e635"/>
    <rect x="30" y="160" width="80" height="12" rx="6" fill="#a3e635"/>
    
    <!-- Ticket Notches -->
    <circle cx="0" cy="120" r="16" fill="#a3e635"/>
    <circle cx="200" cy="120" r="16" fill="#a3e635"/>
  </g>
</svg>
