<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#000000"/>
  
  <!-- Grid Pattern (subtle) -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Ticket Icon -->
  <g transform="translate(100, 200)">
    <rect x="0" y="0" width="120" height="120" rx="20" fill="#a3e635"/>
    <path d="M 30 40 L 90 40 L 90 50 L 30 50 Z M 30 60 L 70 60 L 70 70 L 30 70 Z M 30 80 L 90 80 L 90 90 L 30 90 Z" fill="#000000"/>
  </g>
  
  <!-- Main Text -->
  <text x="260" y="280" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="#ffffff">
    PrivyDesk
  </text>
  
  <!-- Tagline -->
  <text x="260" y="340" font-family="Arial, sans-serif" font-size="32" fill="#cccccc">
    AI-Powered Customer Support Platform
  </text>
  
  <!-- Features -->
  <text x="260" y="400" font-family="Arial, sans-serif" font-size="24" fill="#a3e635">
    ✓ 5-30x Cheaper  ✓ No Per-Agent Pricing  ✓ AI Automation
  </text>
  
  <!-- Website -->
  <text x="260" y="460" font-family="Arial, sans-serif" font-size="28" fill="#ffffff">
    privydesk.com
  </text>
</svg>
